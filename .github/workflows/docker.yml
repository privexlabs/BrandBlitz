name: Docker publish

on:
  push:
    tags:
      - "v*"

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  ORG: privexlabs

jobs:
  build-push:
    name: Build & push ${{ matrix.app }} image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write   # required for cosign OIDC keyless signing
      security-events: write # required to upload SARIF results to Security tab


    strategy:
      fail-fast: false
      matrix:
        app: [api, web]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract OCI metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.ORG }}/brandblitz-${{ matrix.app }}
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=BrandBlitz ${{ matrix.app }}
            org.opencontainers.image.description=BrandBlitz ${{ matrix.app }} service
            org.opencontainers.image.vendor=privexlabs
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}

      - name: Build local image ${{ matrix.app }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          load: true
          push: false
          tags: brandblitz-${{ matrix.app }}:local
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.ORG }}/brandblitz-${{ matrix.app }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.ORG }}/brandblitz-${{ matrix.app }}:buildcache,mode=max

      # To run the Trivy scan locally:
      #   docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy image brandblitz-${{ matrix.app }}:local
      - name: Run Trivy vulnerability scanner
        id: trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: brandblitz-${{ matrix.app }}:local
          format: sarif
          output: trivy-results.sarif
          exit-code: 1
          severity: HIGH,CRITICAL

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always() && (steps.trivy.outcome == 'success' || steps.trivy.outcome == 'failure')
        with:
          sarif_file: 'trivy-results.sarif'
          category: brandblitz-${{ matrix.app }}

      - name: Build and push ${{ matrix.app }}
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.ORG }}/brandblitz-${{ matrix.app }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.ORG }}/brandblitz-${{ matrix.app }}:buildcache,mode=max
          provenance: true
          sbom: true


      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with cosign (keyless OIDC)
        run: |
          cosign sign --yes \
            "${{ env.REGISTRY }}/${{ env.ORG }}/brandblitz-${{ matrix.app }}@${{ steps.push.outputs.digest }}"
